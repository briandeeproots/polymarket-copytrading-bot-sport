<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copy Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; max-height: 100vh; }
    body { font: 14px/1.5 system-ui, sans-serif; background: #111; color: #e0e0e0; display: flex; flex-direction: column; }
    .layout { display: flex; gap: 0; min-height: 100vh; max-height: 100vh; overflow: hidden; }
    .leftbar { width: 140px; flex-shrink: 0; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; }
    .leftbar a { padding: 8px 12px; color: #888; text-decoration: none; font-size: 13px; border-left: 3px solid transparent; }
    .leftbar a:hover { color: #ccc; }
    .leftbar a.active { color: #8af; border-left-color: #8af; background: #222; }
    .main { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: column; padding: 12px; gap: 8px; }
    .sidebar { width: 420px; flex-shrink: 0; min-width: 320px; overflow: hidden; display: flex; flex-direction: column; padding: 12px; }
    .page { display: none; flex: 1; min-height: 0; flex-direction: column; overflow: hidden; }
    .page.active { display: flex; }
    header { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
    .badge { background: #2a2a2a; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .badge.live { background: #1a3d1a; }
    .badge.sim { background: #3d3d1a; }
    .main-content { overflow-y: auto; overflow-x: auto; flex: 1; min-height: 0; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #333; }
    th { color: #888; font-weight: 500; }
    .side-BUY { color: #6f6; }
    .side-SELL { color: #f66; }
    .positions-panel { background: #1a1a1a; border-radius: 8px; padding: 12px; border: 1px solid #333; }
    .positions-panel h3 { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
    .user-block { margin-bottom: 16px; }
    .user-block:last-child { margin-bottom: 0; }
    .user-header { display: flex; align-items: center; margin-bottom: 4px; cursor: pointer; gap: 6px; }
    .user-header:hover { color: #fff; }
    .user-header .toggle { font-size: 10px; color: #666; transition: transform 0.15s; }
    .user-block.expanded .user-header .toggle { transform: rotate(90deg); color: #8af; }
    .user-addr { font-family: ui-monospace, monospace; font-size: 11px; color: #8af; word-break: break-all; }
    .user-balances { font-size: 11px; color: #888; margin-top: 2px; margin-bottom: 4px; }
    .user-detail { display: none; margin-top: 8px; }
    .user-block.expanded .user-detail { display: block; }
    .user-summary { font-size: 11px; margin-top: 6px; padding: 8px; background: #252525; border: 1px solid #333; border-radius: 4px; display: block; cursor: pointer; }
    .user-summary:hover { background: #2a2a2a; }
    .user-summary-row { display: flex; gap: 8px; align-items: center; padding: 3px 0; color: #888; flex-wrap: wrap; font-size: 10px; }
    .user-summary-row .pos-slug { color: #ccc; flex: 1 1 auto; min-width: 0; }
    .user-summary-row .pos-side { font-weight: 600; }
    .user-summary-row .side-BUY { color: #6f6; }
    .user-summary-row .side-SELL { color: #f66; }
    .user-summary-row .pos-price { color: #888; font-variant-numeric: tabular-nums; }
    .user-summary-row .pos-at { color: #666; font-size: 9px; }
    .pos-table { width: 100%; font-size: 11px; border-collapse: collapse; }
    .pos-table th { color: #888; font-weight: 500; text-align: left; padding: 4px 8px 4px 0; border-bottom: 1px solid #333; }
    .pos-table td { padding: 4px 8px 4px 0; border-bottom: 1px solid #2a2a2a; vertical-align: top; }
    .pos-table td:last-child { text-align: right; }
    .pos-table tr:last-child td { border-bottom: none; }
    .pos-slug { color: #ccc; word-break: break-word; overflow-wrap: break-word; }
    .pos-outcome { color: #aaa; font-weight: 500; }
    .pos-amount { color: #888; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .pos-price { color: #888; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .pos-delta { font-variant-numeric: tabular-nums; font-weight: 600; min-width: 3.5em; text-align: right; }
    .pos-delta.plus { color: #6f6; animation: delta-flash var(--delta-animation-sec, 2s) ease-out; }
    .pos-delta.minus { color: #f66; animation: delta-flash var(--delta-animation-sec, 2s) ease-out; }
    @keyframes delta-flash {
      0% { opacity: 1; filter: brightness(1.5); }
      100% { opacity: 1; filter: brightness(1); }
    }
    /* Custom scrollbar - matches dark theme */
    :root {
      --scrollbar-track: #1a1a1a;
      --scrollbar-thumb: #444;
      --scrollbar-thumb-hover: #555;
    }
    .main-content,
    #positions {
      scrollbar-color: #444 #1a1a1a;
      scrollbar-width: thin;
    }
    .main-content::-webkit-scrollbar,
    #positions::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .main-content::-webkit-scrollbar-track,
    #positions::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    .main-content::-webkit-scrollbar-thumb,
    #positions::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }
    .main-content::-webkit-scrollbar-thumb:hover,
    #positions::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="leftbar">
      <a href="#" data-page="dashboard">Dashboard</a>
      <a href="#" data-page="log">Log</a>
      <a href="#" data-page="setting">Setting</a>
    </nav>
    <div class="main">
      <header>
        <span class="badge" id="mode">&nbsp;</span>
        <span class="badge" id="targets">0 targets</span>
      </header>
      <div id="page-dashboard" class="page"><div class="main-content" style="color:#888">Dashboard</div></div>
      <div id="page-log" class="page active">
        <div class="main-content">
      <table>
        <thead><tr><th>Time</th><th>Tag</th><th>Side</th><th>Outcome</th><th>Size</th><th>Price</th><th>Market</th><th>Target Address</th><th>Copy Status</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      </div>
      </div>
      <div id="page-setting" class="page"><div class="main-content" style="color:#888">Setting</div></div>
    </div>
    <aside class="sidebar">
      <div class="positions-panel" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden">
        <h3>Live positions</h3>
        <div id="positions" style="overflow-y:auto;overflow-x:hidden;flex:1;min-height:0"></div>
      </div>
    </aside>
  </div>
  <script>
    const api = (window.location.origin || 'http://localhost:3333') + '/api/state';
    const recentChanges = {};
    const expandedAddrs = {};
    function fmtDuration(iso) {
      if (!iso) return '';
      const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (s < 60) return s + 's ago';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    }
    function render(s) {
      document.getElementById('mode').textContent = s.status.mode;
      document.getElementById('mode').className = 'badge ' + (s.status.mode === 'Live' ? 'live' : 'sim');
      document.getElementById('targets').textContent = s.status.targets + ' target(s)';
      const ui = s.ui || {};
      const deltaHighlightSec = (ui.deltaHighlightSec || 10) * 1000;
      const deltaAnimationSec = (ui.deltaAnimationSec || 2) + 's';
      document.documentElement.style.setProperty('--delta-animation-sec', deltaAnimationSec);
      const tbody = document.getElementById('rows');
      tbody.innerHTML = s.logs.slice().reverse().map(r => {
        const targetAddr = r.targetAddress ?? '';
        const status = r.copyStatus ?? r.extra ?? '';
        const sizeStr = r.size != null && r.size !== '' ? Number(r.size).toFixed(2) : (r.size ?? '');
        return '<tr><td>' + r.time.slice(11,19) + '</td><td>' + r.tag + '</td><td class="side-' + r.side + '">' + r.side + '</td><td>' + r.outcome + '</td><td>' + sizeStr + '</td><td>' + r.price + '</td><td>' + r.slug + '</td><td style="font-family:ui-monospace,monospace;font-size:11px;color:#8af;word-break:break-all">' + targetAddr + '</td><td>' + status + '</td></tr>';
      }).join('');
      const users = s.status.targetAddresses || Object.keys(s.positions || {});
      const posDiv = document.getElementById('positions');
      if (!users.length) {
        posDiv.innerHTML = '<p style="color:#666;font-size:12px">No targets</p>';
      } else {
        posDiv.innerHTML = users.map(addr => {
          const posKey = Object.keys(s.positions || {}).find(k => k.toLowerCase() === addr.toLowerCase());
          let pos = posKey ? ((s.positions || {})[posKey] || []) : [];
          const key = addr + '|';
          pos.forEach((p, i) => {
            const pk = key + (p.slug || '?') + '|' + (p.outcome || '?');
            if (p.delta != null && p.deltaAt) recentChanges[pk] = new Date(p.deltaAt).getTime();
          });
          pos = pos.slice().sort((a, b) => {
            const aKey = key + (a.slug || '?') + '|' + (a.outcome || '?');
            const bKey = key + (b.slug || '?') + '|' + (b.outcome || '?');
            const aAt = a.deltaAt ? new Date(a.deltaAt).getTime() : recentChanges[aKey];
            const bAt = b.deltaAt ? new Date(b.deltaAt).getTime() : recentChanges[bKey];
            const now = Date.now();
            const aRecent = aAt && (now - aAt) < deltaHighlightSec ? 1 : 0;
            const bRecent = bAt && (now - bAt) < deltaHighlightSec ? 1 : 0;
            if (aRecent !== bRecent) return bRecent - aRecent;
            return 0;
          });
          Object.keys(recentChanges).forEach(k => {
            if (!k.startsWith(key)) return;
            if ((Date.now() - recentChanges[k]) >= deltaHighlightSec) delete recentChanges[k];
          });
          const mostRecentAt = pos.reduce((acc, p) => {
            const t = p.deltaAt ? new Date(p.deltaAt).getTime() : 0;
            return t > acc ? t : acc;
          }, 0);
          const atStr = mostRecentAt ? fmtDuration(new Date(mostRecentAt).toISOString()) : '';
          const summaryAlert = pos.length + ' position(s)' + (atStr ? ' • ' + atStr : '');
          const isExpanded = !!expandedAddrs[addr];
          const rows = pos.map(p => {
            const deltaCls = p.delta != null ? (p.delta > 0 ? 'pos-delta plus' : 'pos-delta minus') : '';
            const deltaStr = p.delta != null ? (p.delta > 0 ? '+' : '') + Number(p.delta).toFixed(2) : '';
            return '<tr><td class="pos-slug" title="' + (p.slug || '').replace(/"/g, '&quot;') + '">' + (p.slug || '?') + '</td><td class="pos-outcome">' + (p.outcome || '?') + '</td><td class="pos-amount">' + p.size + '</td><td class="pos-price">' + p.curPrice + '</td><td class="' + deltaCls + '">' + deltaStr + '</td></tr>';
          }).join('');
          const detail = '<div class="user-detail"><table class="pos-table"><thead><tr><th>Slug</th><th>Outcome</th><th>Size</th><th>Price</th><th>Δ</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
          const summary = '<div class="user-summary" data-toggle>' + summaryAlert + '</div>';
          const expCls = isExpanded ? ' user-block expanded' : ' user-block';
          return '<div class="' + expCls + '" data-addr="' + addr.replace(/"/g, '&quot;') + '"><div class="user-header" data-toggle><span class="toggle">▶</span><span class="user-addr">' + addr + '</span></div>' + summary + detail + '</div>';
        }).join('');
      }
    }
    const PAGE_KEY = 'copybot-page';
    function showPage(page) {
      if (!['dashboard','log','setting'].includes(page)) page = 'log';
      document.querySelectorAll('.leftbar a').forEach(el => {
        el.classList.toggle('active', el.dataset.page === page);
      });
      document.querySelectorAll('.page').forEach(el => {
        el.classList.toggle('active', el.id === 'page-' + page);
      });
      try { localStorage.setItem(PAGE_KEY, page); } catch (_) {}
    }
    const currentPage = (function(){ try { return localStorage.getItem(PAGE_KEY) || 'log'; } catch(_) { return 'log'; } })();
    showPage(currentPage);
    document.querySelector('.leftbar').addEventListener('click', function(e) {
      const a = e.target.closest('a[data-page]');
      if (!a) return;
      e.preventDefault();
      showPage(a.dataset.page);
    });
    document.getElementById('positions').addEventListener('click', function(e) {
      const toggleEl = e.target.closest('[data-toggle]');
      if (!toggleEl) return;
      const block = toggleEl.closest('.user-block');
      const addr = block && block.dataset.addr;
      if (addr) {
        expandedAddrs[addr] = !expandedAddrs[addr];
        block.classList.toggle('expanded', !!expandedAddrs[addr]);
      }
    });
    function poll() { fetch(api).then(r => r.json()).then(render).catch(() => {}); }
    poll();
    setInterval(poll, 3000);
  </script>
</body>
</html>
